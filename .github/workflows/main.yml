name: CI/CD with docker (using secrets.APPLICATION)

on:
  push:
    branches:
      - main
      - develop

env:
  DOCKER_IMAGE_NAME: ${{ secrets.DOCKER_IMAGE_NAME }}
  EC2_HOST: ${{ secrets.EC2_HOST }}
  PRIVATE_KEY: ${{ secrets.EC2_ACCESS_KEY }}

jobs:
  build-and-push-docker:
    runs-on: ubuntu-latest

    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'develop' || github.event_name == 'push' && github.ref == 'refs/heads/develop' && github.event.head_commit.message != 'Merge pull request'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create application.yml from GitHub Secrets
        run: |
          cat <<EOF > ./src/main/resources/application.yml
          ${{ secrets.APPLICATION }}
          EOF

      - name: Build native lib (Ubuntu 22.04 / glibc 2.35)
        run: |
          docker build -f Dockerfile.builder -t poseidon-builder .
          docker run --rm \
            -e HOST_UID=$(id -u) -e HOST_GID=$(id -g) \
            -v "$PWD:/work" poseidon-builder \
            bash -lc '/root/.cargo/bin/cargo --version; \
            cd native/poseidon; \
            /root/.cargo/bin/cargo build --release --target x86_64-unknown-linux-gnu; \
            chown -R $HOST_UID:$HOST_GID target'
      
          cp native/poseidon/target/x86_64-unknown-linux-gnu/release/libposeidon.so \
            src/main/resources/libposeidon.so

          file src/main/resources/libposeidon.so || true
          ldd  src/main/resources/libposeidon.so || true

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build with Gradle
        run: ./gradlew clean build -x test -x buildPoseidonNative

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Docker image
        run: docker build --platform linux/amd64 -t ${{ env.DOCKER_IMAGE_NAME }} .

      - name: Push Docker image
        run: docker push ${{ env.DOCKER_IMAGE_NAME }}

  deploy-to-ec2:
    needs: build-and-push-docker
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.EC2_HOST }}
          username: ubuntu
          key: ${{ env.PRIVATE_KEY }}
          script: |
            cd /home/ubuntu/
            sudo chmod 666 /var/run/docker.sock

            # 기존 컨테이너 정리
            sudo docker stop dket-app || true
            sudo docker rm -f dket-app || true

            # 최신 이미지 pull 후 컨테이너 실행
            sudo docker pull ${{ env.DOCKER_IMAGE_NAME }}
            sudo docker run -d \
              --name dket-app \
              -p 8080:8080 \
              -e TZ=Asia/Seoul \
              -e JAVA_OPTS="-Duser.timezone=Asia/Seoul -Xmx256m" \
              ${{ env.DOCKER_IMAGE_NAME }}

            # 불필요한 이미지 정리
            sudo docker image prune -f
server:
  port: 8080

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
      enabled: true

    session:
      timeout: 5m # 세션 만료 시간

  web:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

  time-zone: Asia/Seoul

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true

cloud:
  aws:
    s3:
      bucket: hongik-dket
    region:
      static: ap-southeast-2
    stack:
      auto: false
    credentials:
      accessKey: ${AWS_ACCESS_KEY_ID}
      secretKey: ${AWS_SECRET_ACCESS_KEY}

web3:
  network-url: ${ETH_RPC_URL}
  private-key: ${ETH_PRIVATE_KEY}
  contract-address: "0x2ea3dccfc3114f43a0ab126eb24c55cc762a4407"

pinata:
  api-key: ${PINATA_API_KEY}
  api-secret: ${PINATA_API_SECRET}
  upload-url: "https://api.pinata.cloud/pinning/pinFileToIPFS"
  gateway: "amaranth-recent-lizard-832.mypinata.cloud"

jwt:
  secret: "hadgfsfsfsfsssfsfssfsfsfsffasadad123456asdfsadf7890zsadfjksadfksdafsafdawfjasfaasfhasdfhsadajfhaslfha"
